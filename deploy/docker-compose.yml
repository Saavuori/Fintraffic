# Production stack for fintraffic (rootless Podman on the Oracle host).
#
# TLS termination is NOT here: the Caddy container from the ratikka stack owns
# :80/:443 on this host and proxies fintraffic.duckdns.org to this backend
# over the shared external `web-proxy` network.
#
# Migration note: this stack replaces the standalone marinetraffic stack. To
# keep the recorded vessel trail history, copy the old `marinetraffic-trail`
# volume's trail.db into `fintraffic-trail` before first start.
services:
  fintraffic-backend:
    image: ghcr.io/saavuori/fintraffic:latest
    container_name: fintraffic-backend
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://fintraffic-cache:6379
      - PORT=8080
      # Vessel trail history (SQLite). 60-day retention, 1 point/min/vessel.
      - TRAIL_DB_PATH=/data/trail.db
      - TRAIL_RETENTION_DAYS=60
      - TRAIL_INTERVAL_SEC=60
    volumes:
      # Persist trail history across container recreation.
      - fintraffic-trail:/data
    networks:
      - default
      - web-proxy
    depends_on:
      - fintraffic-cache

  fintraffic-cache:
    image: docker.io/library/redis:8-alpine
    container_name: fintraffic-cache
    restart: unless-stopped
    command: redis-server --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - default

volumes:
  # Named volume for the SQLite trail history DB (survives container recreation).
  fintraffic-trail:

networks:
  # `default` must be declared explicitly: the podman-compose on the host errors
  # with "missing networks: default" when a service names it but the top-level
  # networks block doesn't define it.
  default:
  web-proxy:
    external: true
